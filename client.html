<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0c10;
    --bg2:      #0f1117;
    --bg3:      #161920;
    --border:   #1e2330;
    --accent:   #00d4aa;
    --accent2:  #0096ff;
    --danger:   #ff4757;
    --warn:     #ffa502;
    --text:     #e8ecf3;
    --text2:    #8892a4;
    --text3:    #4a5568;
    --bubble-me: #0a2a22;
    --bubble-other: #131720;
    --glow: 0 0 20px rgba(0,212,170,.15);
    --radius: 14px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh;
    background: radial-gradient(ellipse at 50% 60%, #051a14 0%, var(--bg) 70%);
  }

  .login-box {
    width: 400px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: 0 0 60px rgba(0,212,170,.08), 0 24px 48px rgba(0,0,0,.5);
    animation: fadeUp .5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    text-align: center; margin-bottom: 32px;
  }
  .login-logo .shield {
    font-size: 40px; display: block; margin-bottom: 8px;
    filter: drop-shadow(0 0 12px var(--accent));
  }
  .login-logo h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -.5px;
    color: var(--text);
  }
  .login-logo h1 span { color: var(--accent); }
  .login-logo p { color: var(--text2); font-size: 13px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,.12);
  }
  .field input::placeholder { color: var(--text3); }

  .server-field { display: flex; gap: 8px; }
  .server-field input { flex: 1; }

  #loginBtn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
    color: #000; font-weight: 700; font-size: 15px;
    border: none; border-radius: 10px; cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .15s;
    font-family: 'Space Grotesk', sans-serif;
  }
  #loginBtn:hover { opacity: .9; transform: translateY(-1px); }
  #loginBtn:active { transform: translateY(0); }
  #loginBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  #loginError {
    margin-top: 14px; padding: 12px 16px;
    background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.3);
    border-radius: 10px; color: var(--danger);
    font-size: 13px; display: none;
  }

  #loginSuccess {
    margin-top: 14px; padding: 12px 16px;
    background: rgba(0,212,170,.08); border: 1px solid rgba(0,212,170,.25);
    border-radius: 10px; color: var(--accent);
    font-size: 13px; display: none;
  }

  /* ── AUTH TABS ── */
  .auth-tabs {
    display: flex; background: var(--bg3); border-radius: 12px;
    padding: 4px; margin-bottom: 24px; gap: 4px;
  }
  .tab-btn {
    flex: 1; padding: 10px; border: none; border-radius: 9px;
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all .2s;
    background: transparent; color: var(--text2);
  }
  .tab-btn.active {
    background: var(--bg2); color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  .field-slide {
    overflow: hidden;
    transition: max-height .3s ease, opacity .3s ease;
  }
  .field-slide.hidden {
    max-height: 0 !important; opacity: 0; margin: 0;
  }

  /* ── CHAT LAYOUT ── */
  #chatScreen {
    display: none; height: 100vh;
    flex-direction: row;
  }

  /* Sidebar */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header .logo {
    font-size: 17px; font-weight: 700; color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-header .logo .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
  .sidebar-header .server-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text3); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .sidebar-section {
    padding: 14px 20px 8px;
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: .8px;
  }

  #userList {
    flex: 1; overflow-y: auto; padding: 0 12px 12px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }

  .user-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    cursor: pointer; transition: background .15s;
    margin-bottom: 2px;
  }
  .user-item:hover { background: var(--bg3); }
  .user-item.active { background: rgba(0,212,170,.08); }
  .user-item.me { opacity: .6; cursor: default; }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    color: #000;
  }

  .user-item .nick {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .user-item .you-label {
    font-size: 11px; color: var(--text3); margin-left: auto; flex-shrink: 0;
  }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .my-nick {
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .my-nick .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .my-nick span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #logoutBtn {
    width: 100%; margin-top: 10px; padding: 9px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 9px; color: var(--text2); cursor: pointer;
    font-size: 13px; transition: all .2s;
    font-family: 'Space Grotesk', sans-serif;
  }
  #logoutBtn:hover { border-color: var(--danger); color: var(--danger); }

  /* Main chat */
  .chat-main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg);
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex; align-items: center; gap: 12px;
  }
  .chat-header .room-name {
    font-size: 16px; font-weight: 700;
  }
  .chat-header .room-name span { color: var(--accent); }
  .chat-header .security-badge {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--accent);
    background: rgba(0,212,170,.08); border: 1px solid rgba(0,212,170,.2);
    padding: 4px 10px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }
  .online-count {
    font-size: 12px; color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 4px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }

  /* System messages */
  .sys-msg {
    text-align: center; font-size: 12px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 0; margin: 4px 0;
  }
  .sys-msg.join { color: #2ecc71; }
  .sys-msg.leave { color: var(--warn); }
  .sys-msg.error { color: var(--danger); }

  /* Chat bubbles */
  .msg-group { display: flex; flex-direction: column; gap: 2px; }

  .msg-row {
    display: flex; align-items: flex-end; gap: 10px;
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-row .av-wrap { flex-shrink: 0; width: 32px; }
  .msg-row .av-wrap .avatar { width: 28px; height: 28px; font-size: 11px; border-radius: 8px; }
  .msg-row .av-wrap.hidden { visibility: hidden; }

  .bubble {
    max-width: 65%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }
  .bubble.other {
    background: var(--bubble-other);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble.me {
    background: var(--bubble-me);
    border: 1px solid rgba(0,212,170,.2);
    border-bottom-right-radius: 4px;
    color: #c8ffe8;
  }
  .bubble.dm {
    background: #1a0d2e;
    border: 1px solid rgba(150,50,255,.3);
    color: #d4b8ff;
  }

  .bubble .nick-label {
    font-size: 11px; font-weight: 600;
    color: var(--text2); margin-bottom: 3px;
    display: block;
  }
  .bubble .ts {
    font-size: 10px; color: var(--text3);
    margin-top: 4px; text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }

  .msg-row.me .bubble .nick-label { display: none; }

  /* DM mode */
  .dm-mode .chat-header { background: #0d0818; border-bottom-color: rgba(150,50,255,.3); }
  .dm-mode .chat-header .room-name span { color: #a855f7; }
  .dm-mode .security-badge { color: #a855f7; background: rgba(168,85,247,.08); border-color: rgba(168,85,247,.2); }

  /* Typing indicator */
  #typingIndicator {
    padding: 6px 24px;
    font-size: 12px; color: var(--text2);
    font-style: italic; min-height: 24px;
    font-family: 'JetBrains Mono', monospace;
  }
  .typing-dots span {
    display: inline-block; width: 5px; height: 5px;
    background: var(--text2); border-radius: 50%; margin: 0 1px;
    animation: blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .2; } 40% { opacity: 1; } }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }

  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
  }

  #msgInput {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none; min-height: 48px; max-height: 120px;
    line-height: 1.4;
    transition: border-color .2s;
  }
  #msgInput:focus { border-color: var(--accent); }
  #msgInput::placeholder { color: var(--text3); }

  #sendBtn {
    width: 48px; height: 48px; flex-shrink: 0;
    background: var(--accent);
    border: none; border-radius: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: opacity .2s, transform .15s;
  }
  #sendBtn:hover { opacity: .85; transform: scale(1.05); }
  #sendBtn:disabled { opacity: .3; }

  .input-hint {
    font-size: 11px; color: var(--text3); margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* DM banner */
  #dmBanner {
    display: none; align-items: center; gap: 8px;
    padding: 10px 16px;
    background: rgba(168,85,247,.08);
    border: 1px solid rgba(168,85,247,.2);
    border-radius: 10px; margin-bottom: 8px;
    font-size: 13px; color: #d4b8ff;
  }
  #dmBanner.show { display: flex; }
  #cancelDm {
    margin-left: auto; background: none; border: none;
    color: var(--text2); cursor: pointer; font-size: 16px;
    padding: 2px 6px;
  }
  #cancelDm:hover { color: var(--danger); }

  /* Connection status */
  #connStatus {
    position: fixed; top: 16px; right: 16px;
    padding: 8px 14px; border-radius: 20px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    font-weight: 600; z-index: 100;
    transition: all .3s; pointer-events: none;
  }
  #connStatus.connected {
    background: rgba(0,212,170,.12); color: var(--accent);
    border: 1px solid rgba(0,212,170,.3);
  }
  #connStatus.disconnected {
    background: rgba(255,71,87,.12); color: var(--danger);
    border: 1px solid rgba(255,71,87,.3);
  }
  #connStatus.connecting {
    background: rgba(255,165,2,.12); color: var(--warn);
    border: 1px solid rgba(255,165,2,.3);
  }

  /* Notification badge */
  .notif-badge {
    display: inline-block; min-width: 18px; height: 18px;
    background: var(--accent2); color: #fff;
    font-size: 11px; font-weight: 700;
    border-radius: 9px; text-align: center; line-height: 18px;
    padding: 0 4px; margin-left: auto;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .login-box { width: 90%; padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <span class="shield">🛡️</span>
      <h1>Secure<span>Chat</span></h1>
      <p>end-to-end encrypted · AES-256-GCM</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Accedi</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Registrati</button>
    </div>

    <div class="field">
      <label>Server</label>
      <input type="text" id="serverInput" placeholder="http://localhost:3000" value="">
    </div>

    <div class="field">
      <label>Nickname</label>
      <input type="text" id="nickInput" placeholder="il_tuo_nome" maxlength="32" autocomplete="off">
    </div>

    <div class="field">
      <label id="passLabel">Password</label>
      <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="field field-slide hidden" id="confirmField" style="max-height:80px">
      <label>Conferma Password</label>
      <input type="password" id="confirmInput" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button id="loginBtn">Accedi →</button>
    <div id="loginError"></div>
    <div id="loginSuccess"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="dot"></div>SecureChat</div>
      <div class="server-url" id="serverLabel"></div>
    </div>
    <div class="sidebar-section">Online (<span id="onlineCount">0</span>)</div>
    <div id="userList"></div>
    <div class="sidebar-footer">
      <div class="my-nick"><div class="status-dot"></div><span id="myNick">—</span></div>
      <button id="logoutBtn">⏻ Disconnetti</button>
    </div>
  </div>

  <div class="chat-main" id="chatMain">
    <div class="chat-header">
      <div class="room-name"># <span id="roomTitle">stanza pubblica</span></div>
      <span class="online-count" id="headerOnline">0 online</span>
      <div class="security-badge">🔒 AES-256-GCM</div>
    </div>

    <div id="messages"></div>

    <div id="typingIndicator"></div>

    <div class="input-area">
      <div id="dmBanner">
        <span>💬 DM a <strong id="dmTarget"></strong></span>
        <button id="cancelDm">✕</button>
      </div>
      <div class="input-wrap">
        <textarea id="msgInput" placeholder="Scrivi un messaggio…" rows="1"></textarea>
        <button id="sendBtn">➤</button>
      </div>
      <div class="input-hint">Invio = invia · Shift+Invio = a capo · Clic su utente = DM privato</div>
    </div>
  </div>
</div>

<div id="connStatus" class="connecting">⟳ connessione…</div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────
let ws = null;
let myId = null, myNick = null, myToken = null, mySessionId = null;
let serverUrl = '';
let dmTargetId = null, dmTargetNick = null;
let typingTimer = null, isTyping = false;
let typingUsers = {};
let unreadDm = {};
let reconnectTimer = null, reconnectDelay = 2000;
const COLORS = ['#00d4aa','#0096ff','#a855f7','#ff6b6b','#ffa502','#2ecc71','#f39c12','#e056fd'];

// ─── AVATAR COLOR ────────────────────────────────────────────────────
function colorFor(nick) {
  let h = 0; for (const c of nick) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}
function avatarFor(nick) {
  const c = colorFor(nick);
  return `<div class="avatar" style="background:${c}">${nick.slice(0,2).toUpperCase()}</div>`;
}

// ─── LOGIN / REGISTER ────────────────────────────────────────────────
document.getElementById('serverInput').value = location.origin;

// ── Auto-restore saved session ──
(function restoreSession() {
  try {
    const saved = localStorage.getItem('sc_session');
    if (!saved) return;
    const s = JSON.parse(saved);
    if (!s.token || !s.sessionId || !s.serverUrl || !s.nick || !s.id) return;
    // Pre-fill server URL
    document.getElementById('serverInput').value = s.serverUrl;
    myToken = s.token; myId = s.id; myNick = s.nick;
    mySessionId = s.sessionId; serverUrl = s.serverUrl;
    // Show a "resuming…" message then connect
    document.getElementById('loginBtn').disabled = true;
    document.getElementById('loginBtn').textContent = 'Ripristino sessione…';
    showLoginSuccess(`✔ Sessione trovata per "${s.nick}". Connessione…`);
    setTimeout(() => connectWS(), 300);
  } catch { localStorage.removeItem('sc_session'); }
})();

let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  const confirmField = document.getElementById('confirmField');
  if (tab === 'register') {
    confirmField.classList.remove('hidden');
    document.getElementById('passLabel').textContent = 'Scegli Password';
    document.getElementById('loginBtn').textContent = 'Registrati →';
    document.getElementById('passInput').autocomplete = 'new-password';
  } else {
    confirmField.classList.add('hidden');
    document.getElementById('passLabel').textContent = 'Password';
    document.getElementById('loginBtn').textContent = 'Accedi →';
    document.getElementById('passInput').autocomplete = 'current-password';
  }
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginSuccess').style.display = 'none';
}

document.getElementById('loginBtn').addEventListener('click', doAuth);
['nickInput','passInput','serverInput','confirmInput'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('keydown', e => e.key === 'Enter' && doAuth());
});

async function doAuth() {
  const server = document.getElementById('serverInput').value.trim().replace(/\/$/, '');
  const nick   = document.getElementById('nickInput').value.trim();
  const pass   = document.getElementById('passInput').value;
  const confirm = document.getElementById('confirmInput').value;
  const btn    = document.getElementById('loginBtn');

  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginSuccess').style.display = 'none';

  if (!server || !nick || !pass) return showLoginError('Compila tutti i campi.');

  if (currentTab === 'register') {
    if (pass.length < 6) return showLoginError('Password minimo 6 caratteri.');
    if (pass !== confirm) return showLoginError('Le password non coincidono.');
  }

  btn.disabled = true;
  btn.textContent = currentTab === 'register' ? 'Registrazione…' : 'Connessione…';

  try {
    const endpoint = currentTab === 'register' ? '/register' : '/login';
    const res = await fetch(`${server}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nick, password: pass })
    });
    const data = await res.json();

    if (!res.ok) {
      showLoginError(data.error || 'Errore.');
      btn.disabled = false;
      btn.textContent = currentTab === 'register' ? 'Registrati →' : 'Accedi →';
      return;
    }

    if (currentTab === 'register') {
      // After registration, auto-switch to login tab and show success
      showLoginSuccess(`✔ Account "${data.nick}" creato! Accesso in corso…`);
      btn.disabled = false;
      btn.textContent = 'Accedi →';
      // Auto-login
      setTimeout(() => {
        myToken = data.token; myId = data.id; myNick = data.nick;
        mySessionId = data.sessionId;
        serverUrl = server;
        saveSession();
        connectWS();
      }, 800);
    } else {
      myToken = data.token; myId = data.id; myNick = data.nick;
      mySessionId = data.sessionId;
      serverUrl = server;
      saveSession();
      connectWS();
    }
  } catch (e) {
    showLoginError('Impossibile raggiungere il server. Controlla URL e rete.');
    btn.disabled = false;
    btn.textContent = currentTab === 'register' ? 'Registrati →' : 'Accedi →';
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('loginSuccess').style.display = 'none';
}

function showLoginSuccess(msg) {
  const el = document.getElementById('loginSuccess');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
}

// ─── WEBSOCKET ───────────────────────────────────────────────────────
function connectWS() {
  setConnStatus('connecting', '⟳ connessione…');
  const wsUrl = serverUrl.replace(/^http/, 'ws') + '/';
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', token: myToken }));
    reconnectDelay = 2000;
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }
    handleMessage(msg);
  };

  ws.onclose = () => {
    setConnStatus('disconnected', '✕ disconnesso');
    if (myToken) scheduleReconnect();
  };

  ws.onerror = () => setConnStatus('disconnected', '✕ errore');
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    setConnStatus('connecting', `⟳ riconnessione…`);
    connectWS();
    reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
  }, reconnectDelay);
}

// ─── MESSAGE HANDLER ─────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      setConnStatus('connected', '✔ sicuro');
      showChat();
      document.getElementById('myNick').textContent = myNick;
      document.getElementById('serverLabel').textContent = serverUrl;
      updateUserList(msg.users);
      addSysMsg('✔ Connesso come ' + myNick, 'join');
      break;

    case 'join':
      updateUserList(msg.users);
      addSysMsg(`→ ${msg.nick} è entrato nella stanza`, 'join');
      break;

    case 'leave':
      updateUserList(msg.users);
      addSysMsg(`← ${msg.nick} ha lasciato la stanza`, 'leave');
      delete typingUsers[msg.id];
      updateTypingIndicator();
      break;

    case 'message':
      addMessage(msg);
      break;

    case 'dm':
      addDM(msg, false);
      if (dmTargetId !== msg.from) {
        unreadDm[msg.from] = (unreadDm[msg.from] || 0) + 1;
        updateUserList();
      }
      break;

    case 'dm_sent':
      // confirm sent dm
      break;

    case 'typing':
      if (msg.active) typingUsers[msg.id] = msg.nick;
      else delete typingUsers[msg.id];
      updateTypingIndicator();
      break;

    case 'error':
      addSysMsg('⚠ ' + msg.msg, 'error');
      // If error occurs before welcome (auth failure), clear saved session
      if (!myId || msg.msg.includes('Token') || msg.msg.includes('scadut')) {
        clearSession();
      }
      break;

    case 'pong':
      break;
  }
}

// ─── UI ──────────────────────────────────────────────────────────────
function showChat() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
}

let lastSenderId = null;

function addMessage(msg) {
  const el = document.getElementById('messages');
  const isMe = msg.from === myId;
  const showAvatar = msg.from !== lastSenderId;
  lastSenderId = msg.from;

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe ? ' me' : '');

  const avWrap = document.createElement('div');
  avWrap.className = 'av-wrap' + (showAvatar ? '' : ' hidden');
  if (showAvatar) avWrap.innerHTML = avatarFor(msg.nick);

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (isMe ? 'me' : 'other');
  if (!isMe && showAvatar) {
    bubble.innerHTML = `<span class="nick-label" style="color:${colorFor(msg.nick)}">${esc(msg.nick)}</span>`;
  }
  bubble.innerHTML += esc(msg.text);
  bubble.innerHTML += `<div class="ts">${formatTime(msg.ts)}</div>`;

  if (!isMe) row.appendChild(avWrap);
  row.appendChild(bubble);
  if (isMe) row.appendChild(avWrap);

  el.appendChild(row);
  scrollBottom();
}

function addDM(msg, sent) {
  const el = document.getElementById('messages');
  lastSenderId = null;
  const row = document.createElement('div');
  row.className = 'msg-row' + (sent ? ' me' : '');
  const bubble = document.createElement('div');
  bubble.className = 'bubble dm';
  bubble.innerHTML = `<span class="nick-label" style="color:#a855f7">🔒 DM ${sent ? '→ ' + esc(dmTargetNick) : '← ' + esc(msg.nick)}</span>${esc(msg.text)}<div class="ts">${formatTime(msg.ts)}</div>`;
  row.appendChild(bubble);
  el.appendChild(row);
  scrollBottom();
}

function addSysMsg(text, cls = '') {
  lastSenderId = null;
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'sys-msg ' + cls;
  div.textContent = text;
  el.appendChild(div);
  scrollBottom();
}

let users = [];
function updateUserList(list) {
  if (list) users = list;
  const el = document.getElementById('userList');
  el.innerHTML = '';
  document.getElementById('onlineCount').textContent = users.length;
  document.getElementById('headerOnline').textContent = users.length + ' online';

  for (const u of users) {
    const item = document.createElement('div');
    item.className = 'user-item' + (u.id === myId ? ' me' : '') + (u.id === dmTargetId ? ' active' : '');
    const badge = unreadDm[u.id] ? `<span class="notif-badge">${unreadDm[u.id]}</span>` : '';
    item.innerHTML = avatarFor(u.nick) +
      `<span class="nick">${esc(u.nick)}</span>` +
      (u.id === myId ? '<span class="you-label">tu</span>' : badge);
    if (u.id !== myId) {
      item.addEventListener('click', () => startDM(u.id, u.nick));
    }
    el.appendChild(item);
  }
}

function startDM(id, nick) {
  dmTargetId = id; dmTargetNick = nick;
  delete unreadDm[id];
  document.getElementById('dmTarget').textContent = nick;
  document.getElementById('dmBanner').classList.add('show');
  document.getElementById('chatMain').classList.add('dm-mode');
  document.getElementById('roomTitle').textContent = 'DM con ' + nick;
  document.getElementById('msgInput').placeholder = `Messaggio privato a ${nick}…`;
  updateUserList();
  addSysMsg(`💬 Modalità DM con ${nick}`, 'join');
  document.getElementById('msgInput').focus();
}

document.getElementById('cancelDm').addEventListener('click', () => {
  dmTargetId = null; dmTargetNick = null;
  document.getElementById('dmBanner').classList.remove('show');
  document.getElementById('chatMain').classList.remove('dm-mode');
  document.getElementById('roomTitle').textContent = 'stanza pubblica';
  document.getElementById('msgInput').placeholder = 'Scrivi un messaggio…';
  updateUserList();
});

// ─── SEND ────────────────────────────────────────────────────────────
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msgInput').addEventListener('input', onTyping);

function sendMessage() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  if (dmTargetId) {
    ws.send(JSON.stringify({ type: 'dm', to: dmTargetId, text }));
    addDM({ text, ts: Date.now() }, true);
  } else {
    ws.send(JSON.stringify({ type: 'message', text }));
  }
  inp.value = '';
  inp.style.height = '';
  stopTyping();
}

function onTyping() {
  // Auto-resize textarea
  const inp = document.getElementById('msgInput');
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';

  if (!isTyping) {
    isTyping = true;
    ws && ws.send(JSON.stringify({ type: 'typing', active: true }));
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (isTyping) {
    isTyping = false;
    ws && ws.send(JSON.stringify({ type: 'typing', active: false }));
  }
  clearTimeout(typingTimer);
}

function updateTypingIndicator() {
  const others = Object.values(typingUsers).filter(n => n !== myNick);
  const el = document.getElementById('typingIndicator');
  if (others.length === 0) { el.innerHTML = ''; return; }
  const names = others.join(', ');
  el.innerHTML = `${names} ${others.length > 1 ? 'stanno scrivendo' : 'sta scrivendo'} <span class="typing-dots"><span></span><span></span><span></span></span>`;
}

// ─── SESSION PERSISTENCE ─────────────────────────────────────────────
function saveSession() {
  try {
    localStorage.setItem('sc_session', JSON.stringify({
      token: myToken, sessionId: mySessionId,
      id: myId, nick: myNick, serverUrl
    }));
  } catch {}
}

function clearSession() {
  try { localStorage.removeItem('sc_session'); } catch {}
}

// ─── LOGOUT ──────────────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  clearTimeout(reconnectTimer);
  // Revoke session on server so token is invalidated immediately
  if (mySessionId && serverUrl) {
    try {
      await fetch(`${serverUrl}/logout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: mySessionId })
      });
    } catch {}
  }
  clearSession();
  myToken = null; myId = null; myNick = null; mySessionId = null;
  if (ws) ws.close();
  ws = null;
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('messages').innerHTML = '';
  switchTab('login');
  document.getElementById('loginBtn').disabled = false;
  setConnStatus('connecting', '⟳ connessione…');
});

// ─── HELPERS ─────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}
function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}
function setConnStatus(cls, text) {
  const el = document.getElementById('connStatus');
  el.className = cls; el.textContent = text;
}

// ─── PING KEEPALIVE ──────────────────────────────────────────────────
setInterval(() => {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'ping' }));
}, 25000);

// Auto-focus nick input
document.getElementById('nickInput').focus();
</script>
